name: Blade-Tpa
version: 1.0.2
main: net.clouddev1stack.tpa.BladeTpaPlugin
api-version: '1.13'
author: CloudDev1Stack
description: BetterTPA-style teleport request plugin with custom GUIs.
commands:
  tpa:
    description: Request to teleport to a player or reload plugin.
    usage: /tpa <player|reload>
    aliases: [call]
  tpahere:
    description: Request a player to teleport to you.
    usage: /tpahere <player>
    aliases: [s]
  tpahereall:
    description: Request all players to teleport to you.
    usage: /tpahereall
  tpaccept:
    description: Accept teleport requests.
    usage: /tpaccept [player]
    aliases: [tpyes]
  tpdeny:
    description: Deny teleport requests.
    usage: /tpdeny [player]
    aliases: [tpno]
  tpalist:
    description: List pending teleport requests.
    usage: /tpalist
  tpaignore:
    description: Ignore teleport requests from a player.
    usage: /tpaignore <player>
  tpaignoreall:
    description: Toggle ignoring all teleport requests.
    usage: /tpaignoreall
permissions:
  bladetpa.use:
    default: true
  bladetpa.tpa:
    default: true
  bladetpa.tpahere:
    default: true
  bladetpa.tpahereall:
    default: op
  bladetpa.accept:
    default: true
  bladetpa.deny:
    default: true
  bladetpa.list:
    default: true
  bladetpa.ignore:
    default: true
  bladetpa.ignoreall:
    default: true
  bladetpa.reload:
    default: op
  bladetpa.warmup.bypass:
    default: op
  bladetpa.cooldown.bypass:
    default: op
  bladetpa.ignore.bypass:
    default: op
  bladetpa.combat.bypass:
    default: op
